name: images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Server metadata
        id: meta-server
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/tombrk/packup/server
          bake-target: server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Agent metadata
        id: meta-agent
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/tombrk/packup/agent
          bake-target: agent
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push images
        uses: docker/bake-action@v7.2.0
        with:
          source: .
          files: |
            ./docker-bake.hcl
            ${{ steps.meta-server.outputs.bake-file }}
            ${{ steps.meta-agent.outputs.bake-file }}
          targets: default
          push: true
          set: |
            *.cache-from=type=gha,scope=packup
            *.cache-to=type=gha,scope=packup,mode=max
